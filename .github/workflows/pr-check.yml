name: PR Check

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  check-code:
    name: Check Code
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install tooling
        run: |
          python -m pip install --upgrade pip
          python -m pip install ruff

      - name: Lint
        run: ruff check generate_headcode_dummy_export.py

      - name: Compile check
        run: python -m py_compile generate_headcode_dummy_export.py

      - name: Run generator
        run: python generate_headcode_dummy_export.py --output-dir ci_output --seed 20260322

      - name: Verify generated files
        shell: bash
        run: |
          required_files=(
            "ci_output/spots.csv"
            "ci_output/classes.csv"
            "ci_output/types.csv"
            "ci_output/conditions.csv"
            "ci_output/locations.csv"
            "ci_output/operators.csv"
            "ci_output/locomotive_details.csv"
            "ci_output/reference/classes.json"
            "ci_output/reference/types.json"
            "ci_output/reference/conditions.json"
            "ci_output/reference/locations.json"
            "ci_output/reference/operators.json"
            "ci_output/reference/locomotive_details.json"
          )
          for file in "${required_files[@]}"; do
            if [[ ! -s "$file" ]]; then
              echo "Missing or empty expected file: $file"
              exit 1
            fi
          done
